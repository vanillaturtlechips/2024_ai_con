{% extends "base.html" %}
{% block title %}새 게시글 작성 - Flask Board{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>{% if post %}게시글 수정{% else %}새 게시글 작성{% endif %}</h2>
    <form method="POST">
        {{ form.csrf_token }}
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" class="form-control" id="title" name="title" 
                   value="{{ post.title if post else '' }}" required>
        </div>
        <div class="form-group">
            <label for="content">Content</label>
            <textarea class="form-control" id="content" name="content" 
                      rows="10" required>{{ post.content if post else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">
            {% if post %}수정하기{% else %}작성하기{% endif %}
        </button>
        <a href="{{ url_for('home') }}" class="btn btn-secondary">취소</a>
    </form>
</div>
{% endblock %}
